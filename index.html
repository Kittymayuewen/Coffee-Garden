<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>上海咖啡花园 · 插画地图</title>
  <style>
    :root {
      --ink: #315341;
      --muted: #806f5b;
      --line: #ead9bc;
      --paper: #fbf1dd;
      --cream: #fff7e8;
      --pink: #f0789b;
      --green: #42a047;
      --deep-green: #0f6a3e;
      --blue: #9bc8ef;
      --yellow: #ffda24;
      --orange: #ff5128;
      --lilac: #cfb6d8;
      --shadow: 0 18px 40px rgba(126, 86, 46, .16);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: var(--paper); color: var(--ink); }
    body { overflow: hidden; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
    button { font: inherit; color: inherit; }

    #app { position: relative; width: 100%; height: 100%; background: var(--paper); }
    #map { display: none; }

    #fallback-map { position: absolute; z-index: 1; inset: 0; overflow: hidden; background: var(--paper); opacity: 1; transition: opacity .4s ease; }
    #fallback-map::before {
      content: ""; position: absolute; z-index: 0; inset: -10%;
      background:
        radial-gradient(circle at 9% 14%, var(--blue) 0 8%, transparent 8.2%),
        radial-gradient(circle at 93% 7%, var(--pink) 0 11%, transparent 11.2%),
        radial-gradient(circle at 12% 89%, var(--lilac) 0 10%, transparent 10.2%),
        radial-gradient(circle at 84% 90%, var(--yellow) 0 12%, transparent 12.2%);
      opacity: .88;
    }
    #fallback-map::after {
      content: ""; position: absolute; z-index: 0; inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent 0 118px, rgba(66,160,71,.52) 118px 130px, transparent 130px 188px),
        linear-gradient(135deg, transparent 0 42%, rgba(255,81,40,.10) 42% 48%, transparent 48%);
      opacity: .5;
      pointer-events: none;
    }
    #fallback-map.hidden { opacity: 1; pointer-events: auto; }
    .fallback-stage { position: absolute; z-index: 1; inset: 0; transform: scale(1); transition: transform .8s cubic-bezier(.2,.8,.2,1); transform-style: flat; isolation: isolate; }
    .fallback-stage::before {
      content: ""; position: absolute; z-index: 0; width: 38vw; height: 38vw; min-width: 320px; min-height: 320px;
      right: -10vw; top: -14vw; border-radius: 50%; background: var(--orange); opacity: .84;
    }
    .fallback-stage::after {
      content: ""; position: absolute; z-index: 0; width: 26vw; height: 14vw; left: 4vw; bottom: 4vh;
      border-radius: 50% 50% 16% 16%; background: var(--yellow); opacity: .78; transform: rotate(-12deg);
    }
    .fallback-city-layer, .fallback-silhouette { position: absolute; inset: 5% 9% 2% 8%; width: 84%; height: 92%; overflow: visible; transform: rotateX(8deg) rotateZ(-1deg); transform-origin: 50% 58%; }
    .fallback-city-layer { z-index: -1; filter: drop-shadow(20px 24px 0 rgba(214, 112, 80, .16)); pointer-events: none; }
    .fallback-silhouette { z-index: 1; pointer-events: none; }
    .fallback-city { fill: #f5dfb7; stroke: none; }
    .fallback-river { fill: none; stroke: var(--blue); stroke-width: 15; stroke-linecap: round; opacity: .92; vector-effect: non-scaling-stroke; }
    .fallback-grid-line { fill: none; stroke: rgba(66, 160, 71, .28); stroke-width: 8; stroke-linecap: round; opacity: .85; vector-effect: non-scaling-stroke; }
    #fallback-grass-layer, #fallback-wildlife-layer, #fallback-region-layer, #fallback-marker-layer, #fallback-district-layer { position: absolute; inset: 0; }
    #fallback-grass-layer, #fallback-wildlife-layer { pointer-events: none; overflow: hidden; }
    #fallback-wildlife-layer { z-index: 10; }
    #fallback-grass-layer { z-index: 40; }
    .grass, .wildlife {
      position: absolute; left: var(--x); top: var(--y);
      transform: translate(-50%, -100%) rotate(var(--r, 0deg)); opacity: var(--o, .72);
      filter: drop-shadow(0 8px 10px rgba(79, 112, 73, .10));
    }
    .grass { width: var(--w, 70px); height: var(--h, 78px); }
    .grass svg { width: 100%; height: 100%; overflow: visible; }
    .grass .blade { fill: var(--grass-fill, #8fc765); stroke: none; }
    .grass .line { stroke: #365944; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: .66; }
    .grass.fan { --w: 78px; --h: 92px; --o: .66; }
    .grass.tall { --w: 58px; --h: 112px; --o: .64; }
    .grass.low { --w: 86px; --h: 52px; --o: .58; }
    .grass.bush { --w: 92px; --h: 72px; --o: .6; }
    .grass.sprout { --w: 72px; --h: 58px; --o: .56; }
    .grass.soft { --grass-fill: #a5cf75; }
    .grass.deep { --grass-fill: #73ad52; }
    .wildlife { width: var(--w, 42px); height: var(--h, 34px); animation: drift var(--dur, 7s) ease-in-out infinite alternate; }
    .wildlife svg { width: 100%; height: 100%; overflow: visible; }
    .butterfly .wing-a { fill: var(--pink); }
    .butterfly .wing-b { fill: var(--yellow); }
    .butterfly .body { stroke: var(--deep-green); stroke-width: 3; stroke-linecap: round; }
    .bird .body { fill: var(--blue); }
    .bird .wing { fill: var(--deep-green); opacity: .86; }
    .bird .beak { fill: var(--orange); }
    @keyframes drift {
      0% { transform: translate(-50%, -100%) translate(0, 0) rotate(var(--r, 0deg)); }
      45% { transform: translate(-50%, -100%) translate(var(--mx, 14px), var(--my, -10px)) rotate(calc(var(--r, 0deg) + 6deg)); }
      100% { transform: translate(-50%, -100%) translate(var(--tx, 26px), var(--ty, 8px)) rotate(calc(var(--r, 0deg) - 4deg)); }
    }
    #fallback-region-layer { z-index: 30; pointer-events: none; transform: translateZ(0); }
    #fallback-marker-layer { z-index: 90; transform: translateZ(0); }
    #fallback-district-layer { z-index: 100; pointer-events: none; transform: translateZ(0); }
    .fallback-region {
      position: absolute; transform: translate(-50%, -50%) rotate(var(--region-rotate, 0deg));
      width: var(--region-width, 170px); height: var(--region-height, 120px);
      border-radius: 32% 58% 38% 54%; background: var(--region-color, var(--yellow));
      opacity: .26; filter: saturate(.95); transition: opacity .25s ease, transform .45s ease;
    }
    .fallback-region.hidden { opacity: 0; }
    .fallback-district { position: absolute; transform: translate(-50%, -50%); z-index: 12; border: 0; border-radius: 999px; padding: 7px 12px; background: var(--label-color); font-size: 10px; font-weight: 900; cursor: pointer; box-shadow: 0 9px 18px rgba(128,111,91,.18); transition: opacity .25s ease, transform .25s ease; color: var(--deep-green); pointer-events: auto; }
    .fallback-district:hover { transform: translate(-50%, -55%) scale(1.08); }
    .fallback-district.hidden { opacity: 0; pointer-events: none; }

    .topbar {
      position: absolute; z-index: 30; top: 20px; left: 22px; right: 22px;
      display: flex; align-items: flex-start; justify-content: space-between;
      pointer-events: none;
    }

    .brand, .nav-box, .quality-button, .back-button, .district-list, .shop-card, .notice {
      pointer-events: auto;
    }

    .brand {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px 10px 10px;
      background: rgba(255, 247, 232, .94); border: 0; border-radius: 8px 26px 8px 26px;
      box-shadow: 0 12px 28px rgba(128, 111, 91, .18);
    }

    .brand-mark {
      width: 42px; height: 42px; display: grid; place-items: center;
      position: relative; overflow: hidden; border-radius: 50%; background: var(--green);
    }
    .brand-mark::before { content: ""; width: 12px; height: 25px; border-radius: 50%; background: var(--cream); transform: rotate(32deg); }
    .brand-mark::after { content: ""; position: absolute; width: 5px; height: 25px; border-radius: 50%; background: var(--pink); transform: rotate(32deg); }

    .brand h1 { margin: 0; font-size: 17px; letter-spacing: .08em; line-height: 1.2; }
    .brand p { margin: 4px 0 0; font-size: 10px; color: var(--muted); letter-spacing: .12em; }

    .top-actions { display: flex; gap: 10px; align-items: center; }
    .quality-button, .back-button {
      border: 0; border-radius: 7px 18px 7px 18px; background: var(--yellow);
      min-height: 42px; padding: 0 15px; cursor: pointer; font-weight: 700; font-size: 12px;
      box-shadow: 0 9px 18px rgba(128, 111, 91, .18); transition: transform .16s ease, box-shadow .16s ease;
    }
    .quality-button:hover, .back-button:hover { transform: translateY(-2px); box-shadow: 0 13px 22px rgba(128, 111, 91, .22); }
    .quality-button.has-issues { background: var(--pink); }
    .back-button[hidden] { display: none; }

    .nav-box {
      position: absolute; z-index: 25; top: 96px; left: 24px;
      display: flex; align-items: center; gap: 7px; padding: 9px 12px;
      border: 0; border-radius: 7px 18px 7px 18px; background: rgba(255, 247, 232, .94);
      box-shadow: 0 9px 22px rgba(128, 111, 91, .14); font-size: 12px;
    }
    .nav-box button { border: 0; padding: 0; background: transparent; cursor: pointer; font-weight: 800; }
    .nav-box .sep { color: #b1bbb5; }

    .district-list {
      display: none; position: absolute; z-index: 24; left: 24px; bottom: 24px; width: min(310px, calc(100vw - 48px));
      padding: 16px; border: 0; border-radius: 8px 26px 8px 26px; background: rgba(255, 247, 232, .94);
      box-shadow: 0 14px 30px rgba(128, 111, 91, .18); transition: transform .25s ease, opacity .25s ease;
    }
    .district-list.hidden { opacity: 0; transform: translateY(16px); pointer-events: none; }
    .district-list h2 { margin: 0; font-size: 14px; }
    .district-list p { margin: 5px 0 12px; color: var(--muted); font-size: 11px; line-height: 1.5; }
    .district-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .district-card {
      min-height: 62px; padding: 10px; text-align: left; cursor: pointer;
      border: 0; border-radius: 7px 18px 7px 18px; background: var(--district-color, var(--cream));
      transition: transform .15s ease;
    }
    .district-card:hover { transform: translateY(-2px) rotate(-.5deg); }
    .district-card strong { display: block; font-size: 13px; }
    .district-card span { display: block; margin-top: 5px; font-size: 10px; color: #58675f; }

    .notice {
      position: absolute; z-index: 50; left: auto; right: 24px; top: auto; bottom: 24px; transform: none;
      width: min(330px, calc(100vw - 48px)); padding: 12px 14px;
      border: 0; border-radius: 7px 18px 7px 18px; background: rgba(255, 247, 232, .96);
      box-shadow: 0 12px 26px rgba(128, 111, 91, .18); text-align: left;
    }
    .notice[hidden] { display: none; }
    .notice .icon { display: none; }
    .notice h2 { margin: 0 0 4px; font-size: 12px; }
    .notice p { margin: 0; color: var(--muted); font-size: 10px; line-height: 1.5; }
    .notice code { color: var(--ink); background: var(--cream); padding: 2px 5px; border-radius: 5px; }

    .quality-panel {
      position: absolute; z-index: 100; top: 72px; right: 22px; width: min(380px, calc(100vw - 44px));
      max-height: min(520px, calc(100vh - 96px)); overflow: auto; padding: 17px;
      border: 0; border-radius: 22px; background: var(--cream); box-shadow: 0 18px 38px rgba(128, 111, 91, .2);
    }
    .quality-panel[hidden] { display: none; }
    .quality-panel header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .quality-panel h2 { margin: 0; font-size: 14px; }
    .quality-panel .close { width: 30px; height: 30px; border: 0; border-radius: 50%; background: var(--yellow); cursor: pointer; }
    .quality-summary { margin: 10px 0; padding: 10px; background: var(--cream); border-radius: 10px; font-size: 11px; line-height: 1.6; }
    .issue-list { margin: 0; padding: 0; list-style: none; }
    .issue-list li { padding: 9px 0; border-top: 1px dashed var(--line); font-size: 11px; line-height: 1.45; }
    .issue-list strong { color: #a24758; }

    .shop-card {
      position: absolute; z-index: 90; right: 24px; top: 92px; bottom: 24px;
      width: min(360px, calc(100vw - 48px)); overflow: auto;
      border: 0; border-radius: 10px 34px 10px 34px; background: var(--cream);
      box-shadow: 0 22px 45px rgba(128, 111, 91, .24); transform: translateX(calc(100% + 50px));
      transition: transform .35s cubic-bezier(.2,.8,.2,1);
    }
    .shop-card.show { transform: translateX(0); }
    .shop-visual { min-height: 220px; display: grid; place-items: center; background: radial-gradient(circle, var(--yellow) 0 32%, var(--pink) 33% 44%, var(--blue) 45%); }
    .shop-visual img { width: 210px; height: 246px; object-fit: contain; filter: drop-shadow(0 12px 8px rgba(128,111,91,.2)); }
    .shop-body { padding: 20px; }
    .shop-kicker { font-size: 10px; font-weight: 800; letter-spacing: .15em; color: var(--muted); }
    .shop-card h2 { margin: 7px 0 5px; font-size: 22px; line-height: 1.25; }
    .shop-address { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.6; }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin: 16px 0; }
    .metric { padding: 10px 5px; text-align: center; border: 0; border-radius: 16px; background: var(--green); color: #fff7e8; }
    .metric:nth-child(2) { background: var(--pink); }
    .metric:nth-child(3) { background: var(--blue); }
    .metric strong { display: block; font-size: 14px; }
    .metric span { display: block; margin-top: 3px; font-size: 9px; color: #59675f; }
    .shop-description { margin: 0 0 14px; font-size: 12px; line-height: 1.75; }
    .detail-grid { display: grid; gap: 8px; margin: 0 0 15px; }
    .detail-item { padding: 11px 12px; border: 0; border-radius: 17px; background: #fff; }
    .detail-item:nth-child(1) { background: var(--cream); }
    .detail-item:nth-child(2) { background: #fbe8ed; }
    .detail-item:nth-child(3) { background: #edf2fd; }
    .detail-item:nth-child(4) { background: #edf8f1; }
    .detail-item strong { display: block; margin-bottom: 4px; font-size: 10px; letter-spacing: .08em; }
    .detail-item p { margin: 0; font-size: 11px; line-height: 1.55; }
    .location-note { margin: 8px 0 0; padding: 7px 9px; border-radius: 9px; background: #fff2c8; color: #69591f; font-size: 10px; line-height: 1.45; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { padding: 5px 9px; border: 0; border-radius: 999px; background: var(--yellow); font-size: 10px; }
    .card-close { position: absolute; right: 12px; top: 12px; width: 34px; height: 34px; border: 0; border-radius: 50%; background: var(--orange); color: #fff7e8; cursor: pointer; font-size: 17px; }

    .district-label {
      min-width: 94px; padding: 9px 12px;
      border: 0; border-radius: 18px; background: var(--label-color, #fff);
      box-shadow: 0 9px 18px rgba(128,111,91,.18); text-align: center; cursor: pointer; white-space: nowrap;
    }
    .district-label strong { display: block; font-size: 13px; }
    .district-label span { display: block; margin-top: 3px; color: #59675f; font-size: 9px; }

    .flower-marker {
      position: relative; width: 184px; height: 238px; padding: 0; border: 0; background: transparent;
      cursor: pointer; transition: transform .45s cubic-bezier(.2,.8,.2,1), filter .3s ease, opacity .3s ease;
    }
    .flower-marker img {
      width: 178px; height: 222px; object-fit: contain; filter: drop-shadow(0 12px 7px rgba(128,111,91,.2));
      transform-origin: 50% 96%; animation: flower-sway 3.8s ease-in-out infinite; animation-delay: var(--sway-delay, 0s);
    }
    .flower-marker span {
      position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); max-width: 132px;
      padding: 5px 9px; border: 0; border-radius: 999px; background: var(--cream);
      font-size: 9px; font-weight: 800; white-space: nowrap; opacity: 0; transition: opacity .15s ease;
    }
    .flower-marker.overview { transform: scale(.62); opacity: .96; }
    .flower-marker.district-focus { transform: translateY(-8px) scale(1.18); }
    .flower-marker.muted { transform: scale(.78); opacity: .22; filter: grayscale(.55); }
    .flower-marker.hidden { opacity: 0; pointer-events: none; }
    .flower-marker:hover { transform: translateY(-10px) scale(1.28); z-index: 3; }
    .flower-marker:hover span, .flower-marker.selected span { opacity: 1; }
    .flower-marker.selected { transform: translateY(-10px) scale(1.28); filter: saturate(1.16); z-index: 5; }

    .fallback-flower { position: absolute; transform: translate(-50%, -88%) scale(.62); z-index: 8; }
    .fallback-flower.overview { transform: translate(-50%, -88%) scale(.62); }
    .fallback-flower.district-focus { transform: translate(-50%, -86%) scale(1.18); z-index: 16; }
    .fallback-flower.muted { transform: translate(-50%, -88%) scale(.72); }
    .fallback-flower.selected { transform: translate(-50%, -74%) scale(1.28); z-index: 30; }
    .fallback-flower:hover { transform: translate(-50%, -86%) scale(1.28); }

    @keyframes flower-sway {
      0%, 100% { transform: rotate(-2.2deg) translateX(-1px); }
      50% { transform: rotate(2.8deg) translateX(2px); }
    }

    .demo-ribbon {
      position: absolute; z-index: 20; left: 50%; bottom: 16px; transform: translateX(-50%);
      padding: 7px 11px; border: 0; border-radius: 999px;
      background: var(--yellow); font-size: 9px; font-weight: 800; letter-spacing: .08em; pointer-events: none;
    }

    @media (max-width: 720px) {
      .topbar { top: 12px; left: 12px; right: 12px; }
      .brand { max-width: calc(100vw - 126px); padding: 8px; border-radius: 14px; }
      .brand-mark { width: 36px; height: 36px; font-size: 20px; }
      .brand h1 { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .brand p { display: none; }
      .quality-button, .back-button { min-height: 38px; padding: 0 11px; font-size: 0; }
      .quality-button::before { content: "数据"; font-size: 11px; }
      .back-button::before { content: "返回"; font-size: 11px; }
      .nav-box { top: 70px; left: 12px; }
      .district-list { left: 12px; bottom: 12px; width: calc(100vw - 24px); max-height: 39vh; overflow: auto; }
      .shop-card { left: 12px; right: 12px; top: auto; bottom: 12px; width: auto; max-height: 62vh; transform: translateY(calc(100% + 30px)); }
      .shop-card.show { transform: translateY(0); }
      .shop-visual { min-height: 130px; }
      .shop-visual img { width: 134px; height: 156px; }
      .shop-body { padding: 16px; }
      .shop-card h2 { font-size: 18px; }
      .demo-ribbon { bottom: auto; top: 116px; }
      .flower-marker { width: 126px; height: 162px; }
      .flower-marker img { width: 122px; height: 150px; }
    }
  </style>
</head>
<body>
  <audio id="background-audio" src="assets/audio/background-nature.mp3" autoplay loop preload="auto" playsinline></audio>
  <main id="app">
    <div id="map" aria-label="上海咖啡店三维地图"></div>
    <div id="fallback-map" aria-label="上海咖啡店插画地图">
      <div class="fallback-stage" id="fallback-stage">
        <svg class="fallback-city-layer" viewBox="0 0 760 640" aria-hidden="true">
          <path class="fallback-city" d="M180 80 295 45 430 68 550 120 620 218 600 330 655 420 570 540 455 590 330 570 215 610 120 535 72 430 112 325 76 225 130 145Z"/>
        </svg>
        <svg class="fallback-silhouette" viewBox="0 0 760 640" aria-hidden="true">
          <path class="fallback-grid-line" d="M125 180 580 460M105 380 575 170M235 68 205 580M455 76 485 570"/>
          <path class="fallback-river" d="M600 18C558 92 610 152 545 230S470 350 405 438 330 548 255 638"/>
          <rect x="478" y="352" width="105" height="105" rx="16" fill="#397a72" opacity=".14" transform="rotate(18 530 404)"/>
          <circle cx="238" cy="170" r="54" fill="#d66a4a" opacity=".16"/>
        </svg>
        <div id="fallback-grass-layer" aria-hidden="true">
          <span class="grass fan deep" style="--x:10%;--y:31%;--r:-8deg"><svg viewBox="0 0 90 105"><path class="blade" d="M44 101C30 70 20 38 28 10c18 22 20 58 16 91Z"/><path class="blade" d="M44 101C47 63 53 25 70 7c8 34-3 68-26 94Z"/><path class="blade" d="M44 101C58 73 72 50 84 38c0 28-16 51-40 63Z"/><path class="blade" d="M44 101C29 82 16 68 6 60c2 20 18 34 38 41Z"/><path class="line" d="M44 97C42 64 40 34 29 13M44 97C52 63 59 31 69 10M44 97C58 77 71 55 83 41"/></svg></span>
          <span class="grass low soft" style="--x:19%;--y:49%;--r:4deg"><svg viewBox="0 0 115 62"><path class="blade" d="M8 59C17 32 32 27 43 59Z"/><path class="blade" d="M34 59C44 20 61 16 72 59Z"/><path class="blade" d="M64 59C76 28 94 27 108 59Z"/><path class="line" d="M42 56C43 43 43 33 40 23M72 56C71 39 68 28 61 18M91 56C91 44 94 36 101 30"/></svg></span>
          <span class="grass tall" style="--x:29%;--y:25%;--r:3deg"><svg viewBox="0 0 70 125"><path class="blade" d="M34 122C21 82 13 44 19 8c22 31 24 76 15 114Z"/><path class="blade" d="M34 122C36 80 43 38 58 16c11 36 3 74-24 106Z"/><path class="blade" d="M34 122C22 98 13 78 6 62c18 5 27 24 28 60Z"/><path class="line" d="M34 116C34 78 30 39 20 11M34 116C42 81 49 44 58 19"/></svg></span>

    function validateData(rows) {
      const ids = new Set();
      const valid = [];
      for (const source of rows) {
        const shop = { ...source };
        shop.id = cleanText(shop.id);
        shop.name = cleanText(shop.name);
        const district = cleanText(shop.district);
        shop.district = district.endsWith("新区") ? district : district.replace(/区$/, "");
        shop.address = cleanText(shop.address);
        shop.coord_system = cleanText(shop.coord_system).toUpperCase();
        shop.image = cleanText(shop.image);
        shop.lng = Number(shop.lng);
        shop.lat = Number(shop.lat);

        if (!shop.id || !shop.name || !shop.district || !shop.address) {
          addIssue("error", shop.id || shop.name, "缺少 id、name、district 或 address，已跳过");
          continue;
        }
        if (ids.has(shop.id)) {
          addIssue("error", shop.id, "ID 重复，已跳过后出现的记录");
          continue;
        }
        ids.add(shop.id);
        if (!Number.isFinite(shop.lng) || !Number.isFinite(shop.lat) || shop.lng < 120.5 || shop.lng > 122.3 || shop.lat < 30.5 || shop.lat > 31.9) {
          addIssue("error", shop.id, "坐标缺失或不在上海合理范围内，已跳过");
          continue;

        if (!["GCJ02", "WGS84", "BD09", "UNKNOWN"].includes(shop.coord_system)) {
          addIssue("error", shop.id, `不支持的坐标系 ${shop.coord_system || "空值"}，已跳过`);
          continue;
        }
        if (shop.coord_system === "UNKNOWN") {
          addIssue("error", shop.id, "坐标系未知，未猜测坐标，已跳过");
          continue;
        }
        if (!shop.image) addIssue("warning", shop.id, "未填写花束图片，将使用占位图");
        valid.push(shop);
      }
      const approximate = valid.filter((shop) => shop.location_accuracy === "district_approx").length;
      if (approximate) addIssue("warning", "位置", `${approximate} 家门店缺少精确地址和坐标，当前按行政区近似分布`);
      return valid;

        state.AMap.convertFrom([shop.lng, shop.lat], source, (status, result) => {
          if (status === "complete" && result.locations && result.locations[0]) {

            resolve({ ...shop, lng: loc.lng, lat: loc.lat, coord_system: "GCJ02" });
          } else {
            addIssue("error", shop.id, `${shop.coord_system} 坐标转换失败，已跳过`);
            resolve(null);

        });
      });
    }

      const progress = clamp((y - topY) / (bottomY - topY), 0, 1);

      const riverX = riverXAtY(anchor[1], width, height);
      const x = isPudong
        ? clamp(Math.max(anchor[0], riverX + gap), bounds.minX, bounds.maxX)
        : clamp(Math.min(anchor[0], riverX - gap), bounds.minX, bounds.maxX);

    function bouquetOffset(index, count, district, mode, scale) {
      if (count === 1) return [0, 0];
      const seed = seededValue(district, index);
      const golden = Math.PI * (3 - Math.sqrt(5));
      const radiusBase = mode === "focus" ? 66 : 28;
      const radiusStep = mode === "focus" ? 10 : 4;
      const radius = (radiusBase + Math.min(9, count) * radiusStep) * scale;
      if (index === 0) return [0, -radius * .16];
      const ring = Math.sqrt(index / Math.max(1, count - 1));
      const angle = -Math.PI * .64 + index * golden + (seed - .5) * .68;
      const x = Math.cos(angle) * radius * ring * (mode === "focus" ? 1.08 : .92);
      const y = Math.sin(angle) * radius * ring * .72 + index * (mode === "focus" ? 8 : 5) * scale;
      return [x, y];

        return { shop, x: anchor[0] + offset[0], y: anchor[1] + offset[1] };
      });

          for (let b = a + 1; b < points.length; b += 1) {
            const first = points[a];
            const second = points[b];
            let dx = second.x - first.x;
            let dy = second.y - first.y;
            let distance = Math.hypot(dx, dy);
            if (distance < .01) {
              dx = seededValue(first.shop.id, b) - .5;
              dy = seededValue(second.shop.id, a) - .5;
              distance = Math.hypot(dx, dy) || 1;
            }
            if (distance >= target) continue;
            const push = (target - distance) * .22;
            const ux = dx / distance;
            const uy = dy / distance;
            first.x -= ux * push;
            first.y -= uy * push;
            second.x += ux * push;
            second.y += uy * push;
          }
        }
        for (const point of points) {

        }
        for (const point of focusPoints) {
          state.focusPositions.set(point.shop.id, [point.x / width * 100, point.y / height * 100]);
        }
      }

      for (let pass = 0; pass < 60; pass += 1) {
        for (let a = 0; a < labelItems.length; a += 1) {
          for (let b = a + 1; b < labelItems.length; b += 1) {

            const second = labelItems[b];
            const overlapX = (first.w + second.w) / 2 + 10 * scale - Math.abs(second.x - first.x);
            const overlapY = (first.h + second.h) / 2 + 8 * scale - Math.abs(second.y - first.y);
            if (overlapX <= 0 || overlapY <= 0) continue;
            let dx = second.x - first.x;
            let dy = second.y - first.y;
            const distance = Math.hypot(dx, dy) || 1;
            if (distance < 1.5) {
              dx = seededValue(`${first.district}${second.district}`, pass) - .5;
              dy = seededValue(`${second.district}${first.district}`, pass) - .5;

            const uy = dy / (Math.hypot(dx, dy) || 1);
            first.x -= ux * push;
            first.y -= uy * push;
            second.x += ux * push;
            second.y += uy * push;

          const dy = clamp(item.y - item.anchorY, -maxDrift * .8, maxDrift * .8);

    function updateFallbackMarkerPositions() {

        const height = 94 + Math.min(120, shops.length * 13);
        region.style.left = `${anchor[0]}%`;
        region.style.top = `${anchor[1]}%`;
        region.style.setProperty("--region-width", `${width}px`);
        region.style.setProperty("--region-height", `${height}px`);
      }
    }

    function createFallbackFlower(shop) {
      const [x, y] = geoToPercent(shop.lng, shop.lat);
      const button = document.createElement("button");
      button.type = "button";
      button.className = "flower-marker fallback-flower overview";
      button.dataset.shopId = shop.id;
      button.style.left = `${x}%`;
      button.style.top = `${y}%`;
      button.style.setProperty("--sway-delay", swayDelay(shop));
      const img = document.createElement("img");
      img.src = markerImage(shop);
      img.alt = `${shop.name} 花束标记`;
      img.addEventListener("error", fallbackImage);
      const label = document.createElement("span");
      label.textContent = shop.name;
      button.append(img, label);
      button.addEventListener("click", () => {
        if (state.level === "L1") setView("L2", { district: shop.district });
        else setView("L3", { shop });
      });
      return button;
    }

    function buildFallbackMap() {
      els.fallbackMarkers.replaceChildren();
      els.fallbackDistricts.replaceChildren();
      els.fallbackRegions.replaceChildren();
      state.fallbackMarkers.clear();
      state.fallbackDistricts.clear();
      state.fallbackRegions.clear();
      for (const [district, shops] of groupByDistrict()) {
        const center = shopCenter(shops);
        const [x, y] = geoToPercent(center[0], center[1]);
        const region = document.createElement("div");
        region.className = "fallback-region";
        region.style.left = `${x}%`;
        region.style.top = `${y}%`;
        region.style.setProperty("--region-color", districtColor(district));
        region.style.setProperty("--region-rotate", `${Math.round((seededValue(district, 8) - .5) * 32)}deg`);
        els.fallbackRegions.appendChild(region);
        state.fallbackRegions.set(district, region);

        const label = document.createElement("button");
        label.type = "button";
        label.className = "fallback-district";
        label.style.left = `${x}%`;
        label.style.top = `${y}%`;
        label.style.setProperty("--label-color", districtColor(district));
        label.textContent = `${district} · ${shops.length}`;
        label.addEventListener("click", (event) => {
          event.stopPropagation();
          setView("L2", { district });
        });
        els.fallbackDistricts.appendChild(label);
        state.fallbackDistricts.set(district, label);
      }
      for (const shop of state.shops) {
        const marker = createFallbackFlower(shop);
        els.fallbackMarkers.appendChild(marker);
        state.fallbackMarkers.set(shop.id, marker);
      }
      computeOverviewPositions();
      updateFallbackMarkerPositions();
    }

    function syncMarkerClasses() {
      for (const shop of state.shops) {
        const elements = [];
        const mapMarker = state.shopMarkers.get(shop.id);
        if (mapMarker && mapMarker.getContent) elements.push(mapMarker.getContent());
        const fallbackMarker = state.fallbackMarkers.get(shop.id);
        if (fallbackMarker) elements.push(fallbackMarker);
        for (const element of elements) {
          element.classList.remove("overview", "district-focus", "muted", "selected", "hidden");
          if (state.level === "L1") element.classList.add("overview");
          else if (shop.district !== state.district) element.classList.add("hidden");
          else if (state.level === "L2") element.classList.add("district-focus");
          else if (shop.id === state.shop?.id) element.classList.add("selected");
          else element.classList.add("muted");
        }
      }
    }

    function syncFallbackView() {
      const showLabels = state.level === "L1";
      for (const label of state.fallbackDistricts.values()) label.classList.toggle("hidden", !showLabels);
      for (const [district, region] of state.fallbackRegions) {
        region.classList.toggle("hidden", state.level !== "L1" && district !== state.district);
      }
      let scale = 1;
      let origin = [50, 50];
      let shiftX = 0;
      let shiftY = 0;
      if (state.district) {
        const shops = state.shops.filter((shop) => shop.district === state.district);
        const center = shopCenter(shops);
        origin = state.districtAnchors.get(state.district) || geoToPercent(center[0], center[1]);
        scale = state.level === "L3" ? 1.12 : 1.06;
        if (state.level === "L3" && innerWidth > 720) shiftX = Math.min(0, 55 - origin[0]);
        if (state.level === "L3" && innerWidth <= 720) shiftY = Math.min(0, 40 - origin[1]);
      }
      els.fallbackStage.style.transformOrigin = `${origin[0]}% ${origin[1]}%`;
      els.fallbackStage.style.transform = `translate(${shiftX}%, ${shiftY}%) scale(${scale})`;
    }

    function createDistrictButton(district, shops) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "district-card";
      button.style.setProperty("--district-color", districtColor(district));
      const name = document.createElement("strong");
      name.textContent = district;
      const count = document.createElement("span");
      count.textContent = `${shops.length} 家咖啡店`;
      button.append(name, count);
      button.addEventListener("click", () => setView("L2", { district }));
      return button;
    }

    function renderDistrictList() {
      els.districtGrid.replaceChildren();
      for (const [district, shops] of groupByDistrict()) {
        els.districtGrid.appendChild(createDistrictButton(district, shops));
      }
    }

    function renderQuality() {
      const errors = state.issues.filter((item) => item.level === "error").length;
      const warnings = state.issues.length - errors;
      els.qualityButton.textContent = state.issues.length ? `数据质量 ${state.issues.length}` : "数据质量 ✓";
      els.qualityButton.classList.toggle("has-issues", state.issues.length > 0);
      els.qualitySummary.textContent = `有效门店 ${state.shops.length} 家 · 错误 ${errors} 条 · 提醒 ${warnings} 条`;
      els.issueList.replaceChildren();
      if (!state.issues.length) {
        const li = document.createElement("li");
        li.textContent = "当前数据未发现结构问题。";
        els.issueList.appendChild(li);
        return;
      }
      for (const issue of state.issues) {
        const li = document.createElement("li");
        const name = document.createElement("strong");
        name.textContent = `${issue.level === "error" ? "错误" : "提醒"} · ${issue.id}`;
        li.append(name, document.createTextNode(`：${issue.message}`));
        els.issueList.appendChild(li);
      }
    }

    function showNotice(title, message) {
      els.noticeTitle.textContent = title;
      els.noticeText.textContent = message;
      els.notice.hidden = false;
      clearTimeout(showNotice.timer);
      showNotice.timer = setTimeout(() => { els.notice.hidden = true; }, 5200);
    }

    function districtSearch(name) {
      return new Promise((resolve) => {
        const search = new state.AMap.DistrictSearch({ subdistrict: 0, extensions: "all", level: "district" });
        const districtName = name.endsWith("区") ? name : `${name}区`;
        search.search(`上海市${districtName}`, (status, result) => {
          const item = status === "complete" && result.districtList && result.districtList[0];
          resolve(item || null);
        });
      });
    }

    function shopCenter(shops) {
      const sum = shops.reduce((value, shop) => [value[0] + shop.lng, value[1] + shop.lat], [0, 0]);
      return [sum[0] / shops.length, sum[1] / shops.length];
    }

    function createDistrictLabel(district, shops, position) {
      const content = document.createElement("button");
      content.type = "button";
      content.className = "district-label";
      content.style.setProperty("--label-color", districtColor(district));
      const title = document.createElement("strong");
      title.textContent = district;
      const count = document.createElement("span");
      count.textContent = `${shops.length} 家咖啡店`;
      content.append(title, count);
      content.addEventListener("click", () => setView("L2", { district }));
      return new state.AMap.Marker({ position, content, anchor: "center", zIndex: 120 });
    }

    async function buildDistrictOverlays() {
      const groups = groupByDistrict();
      for (const [district, shops] of groups) {
        const result = await districtSearch(district);
        const color = districtColor(district);
        const center = result && result.center ? [result.center.lng, result.center.lat] : shopCenter(shops);
        const polygons = [];
        if (result && result.boundaries) {
          for (const boundary of result.boundaries) {
            const polygon = new state.AMap.Polygon({
              path: boundary,
              fillColor: color,
              fillOpacity: .42,
              strokeColor: "#24332c",
              strokeWeight: 2,
              strokeOpacity: .72,
              bubble: true,
              cursor: "pointer",
              zIndex: 20
            });
            polygon.on("click", () => setView("L2", { district }));
            polygons.push(polygon);
          }
        } else {
          addIssue("warning", district, "行政区边界加载失败，将使用门店中心定位");
        }
        state.polygons.set(district, polygons);
        state.districtLabels.set(district, createDistrictLabel(district, shops, center));
      }
    }

    function createShopMarker(shop) {
      const content = document.createElement("button");
      content.type = "button";
      content.className = "flower-marker";
      content.dataset.shopId = shop.id;
      content.style.setProperty("--sway-delay", swayDelay(shop));
      const img = document.createElement("img");
      img.src = markerImage(shop);
      img.alt = `${shop.name} 花束标记`;
      img.addEventListener("error", fallbackImage);
      const label = document.createElement("span");
      label.textContent = shop.name;
      content.append(img, label);
      const marker = new state.AMap.Marker({
        position: [shop.lng, shop.lat], content, anchor: "bottom-center", zIndex: 100
      });
      marker.on("click", () => {
        state.suppressMapClick = true;
        if (state.level === "L1") setView("L2", { district: shop.district });
        else setView("L3", { shop });
        setTimeout(() => { state.suppressMapClick = false; }, 0);
      });
      return marker;
    }

    function buildShopMarkers() {
      for (const shop of state.shops) state.shopMarkers.set(shop.id, createShopMarker(shop));
    }

    function clearMapOverlays() {
      if (!state.map) return;
      const overlays = [];
      for (const polygons of state.polygons.values()) overlays.push(...polygons);
      overlays.push(...state.districtLabels.values(), ...state.shopMarkers.values());
      if (overlays.length) state.map.remove(overlays);
    }

    function selectedMarkerElement(shop) {
      if (!shop) return null;
      const marker = state.shopMarkers.get(shop.id);
      return marker && marker.getContent ? marker.getContent() : null;
    }

    function fitPadding(level) {
      if (innerWidth <= 720) {
        return level === "L1" ? [120, 20, 350, 20] : [110, 20, 80, 20];
      }
      return [110, 390, 100, 360];
    }

    function updateBreadcrumb() {
      els.breadcrumb.replaceChildren();
      const makeButton = (text, handler) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = text;
        button.addEventListener("click", handler);
        return button;
      };
      els.breadcrumb.appendChild(makeButton("上海", () => setView("L1")));
      if (state.district) {
        const sep = document.createElement("span"); sep.className = "sep"; sep.textContent = "/";
        els.breadcrumb.append(sep, makeButton(state.district, () => setView("L2", { district: state.district })));
      }
      if (state.shop) {
        const sep = document.createElement("span"); sep.className = "sep"; sep.textContent = "/";
        const current = document.createElement("strong"); current.textContent = state.shop.name;
        els.breadcrumb.append(sep, current);
      }
    }

    function showShopCard(shop) {
      const image = document.getElementById("card-image");
      image.src = markerImage(shop);
      image.alt = `${shop.name} 花束插画`;
      image.onerror = fallbackImage;
      document.getElementById("card-kicker").textContent = `${shop.district} · ${TYPE_LABELS[shop.type] || shop.type || "咖啡店"}`;
      document.getElementById("card-name").textContent = shop.name;
      document.getElementById("card-address").textContent = shop.address;
      document.getElementById("card-rating").textContent = Number.isFinite(Number(shop.rating)) ? Number(shop.rating).toFixed(1) : "暂无";
      document.getElementById("card-reviews").textContent = Number.isFinite(Number(shop.reviews)) ? Number(shop.reviews).toLocaleString("zh-CN") : "暂无";
      document.getElementById("card-price").textContent = Number.isFinite(Number(shop.avg_price)) ? `¥${Number(shop.avg_price)}` : "暂无";
      document.getElementById("card-description").textContent = cleanText(shop.description) || "暂无店铺简介。";
      document.getElementById("card-bean").textContent = cleanText(shop.bean_flavor) || "暂无信息";
      document.getElementById("card-social").textContent = cleanText(shop.social) || "暂无信息";
      document.getElementById("card-space").textContent = cleanText(shop.space) || "暂无信息";
      document.getElementById("card-service").textContent = cleanText(shop.service) || "暂无信息";
      document.getElementById("card-location-note").textContent = shop.location_accuracy === "district_approx"
        ? "位置说明：源数据未提供地址与经纬度，目前仅按行政区近似展示。"
        : "位置已经过精确坐标定位。";
      const tags = cleanText(shop.tags).split(/[，,]/).map((tag) => tag.trim()).filter(Boolean);
      const container = document.getElementById("card-tags");
      container.replaceChildren(...tags.map((tag) => {
        const item = document.createElement("span"); item.className = "tag"; item.textContent = tag; return item;
      }));
      els.card.classList.add("show");
    }

    function setView(level, options = {}) {
      state.level = level;
      if (level === "L1") {
        state.district = null;
        state.shop = null;
      } else if (level === "L2") {
        state.district = options.district || state.district;
        state.shop = null;
      } else if (level === "L3") {
        state.shop = options.shop;
        state.district = state.shop.district;
      }

      els.app.dataset.level = level;
      els.districtList.classList.toggle("hidden", level !== "L1");
      els.back.hidden = level === "L1";
      els.card.classList.toggle("show", level === "L3");
      if (level === "L3") showShopCard(state.shop);
      updateFallbackMarkerPositions();
      syncMarkerClasses();
      syncFallbackView();

      if (state.map) {
        clearMapOverlays();
        if (level === "L1") {
          const overlays = [];
          for (const polygons of state.polygons.values()) overlays.push(...polygons);
          overlays.push(...state.districtLabels.values(), ...state.shopMarkers.values());
          if (overlays.length) state.map.add(overlays);
          state.map.setPitch(48);
          state.map.setRotation(-10);
          if (overlays.length) state.map.setFitView(overlays, false, fitPadding("L1"), 10);
          else state.map.setZoomAndCenter(10.2, APP_CONFIG.initialCenter);
        } else if (level === "L2") {
          const shops = state.shops.filter((shop) => shop.district === state.district);
          const overlays = [...(state.polygons.get(state.district) || [])];
          overlays.push(...shops.map((shop) => state.shopMarkers.get(shop.id)).filter(Boolean));
          if (overlays.length) state.map.add(overlays);
          state.map.setPitch(54);
          state.map.setRotation(-6);
          if (overlays.length) state.map.setFitView(overlays, false, fitPadding("L2"), 15);
        } else if (level === "L3") {
          const shops = state.shops.filter((shop) => shop.district === state.district);
          const markers = shops.map((shop) => state.shopMarkers.get(shop.id)).filter(Boolean);
          state.map.add(markers);
          state.map.setPitch(63);
          state.map.setRotation(-12);
          state.map.setZoomAndCenter(17, [state.shop.lng, state.shop.lat]);
        }
      }
      updateBreadcrumb();
    }

    function goBack() {
      if (state.level === "L3") setView("L2", { district: state.district });
      else if (state.level === "L2") setView("L1");
    }

    async function initMap() {
      state.shops = validateData(RAW_SHOPS);
      renderDistrictList();
      renderQuality();
      buildFallbackMap();
      setView("L1");
    }

    els.back.addEventListener("click", goBack);
    els.cardClose.addEventListener("click", goBack);
    els.qualityButton.addEventListener("click", () => { els.qualityPanel.hidden = !els.qualityPanel.hidden; });
    els.qualityClose.addEventListener("click", () => { els.qualityPanel.hidden = true; });
    els.fallbackMap.addEventListener("click", (event) => {
      if (event.target.closest("button")) return;
      if (state.level === "L3") setView("L2", { district: state.district });
    });
    window.addEventListener("resize", () => {
      clearTimeout(window.__coffeeGardenResizeTimer);
      window.__coffeeGardenResizeTimer = setTimeout(() => {
        computeOverviewPositions();
        updateFallbackMarkerPositions();
        syncFallbackView();
      }, 120);
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (!els.qualityPanel.hidden) els.qualityPanel.hidden = true;
        else goBack();
      }
    });
    const backgroundAudio = document.getElementById("background-audio");
    const startBackgroundAudio = () => {
      backgroundAudio.play().then(() => {
        window.removeEventListener("pointerdown", startBackgroundAudio);
        window.removeEventListener("keydown", startBackgroundAudio);
        window.removeEventListener("touchstart", startBackgroundAudio);
      }).catch(() => {});
    };
    startBackgroundAudio();
    window.addEventListener("pointerdown", startBackgroundAudio);
    window.addEventListener("keydown", startBackgroundAudio);
    window.addEventListener("touchstart", startBackgroundAudio, { passive: true });
    initMap();
  </script>
</body>
</html>
